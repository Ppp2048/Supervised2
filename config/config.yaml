stock:
  ticker: "AAPL"
  start_date: "2020-01-01"
  end_date: "2024-01-01"

data:
  raw_path: "data/raw/stock_data.csv"
  processed_path: "data/processed/processed_data.csv"

training:
  test_size: 0.2
  random_state: 42

models:
  linear_regression:
    fit_intercept: true
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1

artifacts:
  model_path: "artifacts/model.pkl"
  metrics_path: "artifacts/metrics.json"