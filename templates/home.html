<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .prediction-form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .predict-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .predict-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            border-left: 5px solid #667eea;
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ticker {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .change {
            font-size: 18px;
            font-weight: bold;
        }

        .change.positive {
            color: #28a745;
        }

        .change.negative {
            color: #dc3545;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .price-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #dc3545;
            margin-top: 20px;
            display: none;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 600px) {
            .prediction-form {
                flex-direction: column;
            }

            .price-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Stock Price Predictor</h1>
            <p>Enter a stock ticker to get tomorrow's predicted closing price</p>
        </div>

        <form class="prediction-form" id="predictionForm">
            <div class="form-group">
                <label for="ticker">Stock Ticker (e.g., AAPL, GOOGL, MSFT)</label>
                <input type="text" id="ticker" name="ticker" placeholder="Enter ticker symbol" required>
            </div>
            <div class="form-group" style="display: flex; align-items: end;">
                <button type="submit" class="predict-btn" id="predictBtn">Predict Price</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing market data...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="ticker" id="resultTicker"></div>
                <div class="change" id="resultChange"></div>
            </div>

            <div class="price-grid">
                <div class="price-item">
                    <div class="price-label">Current Price</div>
                    <div class="price-value" id="currentPrice"></div>
                </div>
                <div class="price-item">
                    <div class="price-label">Predicted Price</div>
                    <div class="price-value" id="predictedPrice"></div>
                </div>
            </div>
        </div>

        <a href="/" class="back-btn">← Back to Home</a>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const ticker = document.getElementById('ticker').value.toUpperCase();
            const predictBtn = document.getElementById('predictBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const resultCard = document.getElementById('resultCard');

            // Reset states
            error.style.display = 'none';
            resultCard.classList.remove('show');
            loading.style.display = 'block';
            predictBtn.disabled = true;
            predictBtn.textContent = 'Predicting...';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `ticker=${ticker}`
                });

                const data = await response.json();

                if (response.ok) {
                    // Display results
                    document.getElementById('resultTicker').textContent = data.ticker;
                    document.getElementById('currentPrice').textContent = `$${data.current_price}`;
                    document.getElementById('predictedPrice').textContent = `$${data.predicted_price}`;

                    const changeElement = document.getElementById('resultChange');
                    changeElement.textContent = `${data.change >= 0 ? '+' : ''}$${data.change} (${data.change_percent >= 0 ? '+' : ''}${data.change_percent}%)`;

                    if (data.change >= 0) {
                        changeElement.className = 'change positive';
                    } else {
                        changeElement.className = 'change negative';
                    }

                    resultCard.classList.add('show');
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Network error. Please try again.';
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                predictBtn.disabled = false;
                predictBtn.textContent = 'Predict Price';
            }
        });
    </script>
</body>
</html>
